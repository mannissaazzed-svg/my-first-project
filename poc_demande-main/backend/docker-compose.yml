version: '3.8'

services:
  # Base de données PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: poc_demandes_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: demandes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demandes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application FastAPI (Backend)
  api:
    build: .
    container_name: poc_demandes_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Surcharge de l'URL pour pointer vers le service docker "db"
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: demandes_db
      APP_NAME: Demandes API
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
    # Commande pour initialiser la DB avec Alembic et lancer le serveur FastAPI
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      # Montage des fichiers locaux pour le live-reload
      - .:/app

volumes:
  postgres_data:
